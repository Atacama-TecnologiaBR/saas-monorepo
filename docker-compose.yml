services:
  # ─── Proxy interno (roteia /social → BrightBean, / → LastSaaS) ─────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - lastsaas
      - brightbean
    restart: unless-stopped

  # ─── Databases ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lastsaas
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: brightbean
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── LastSaaS (Go backend + React frontend embutido) ────────────────────────
  lastsaas:
    build:
      context: ./lastsaas
      dockerfile: Dockerfile
    command: ["sh", "-c", "sleep 5 && ./lastsaas"]
    ports:
      - "4290:4290"
    env_file: .env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "4290"
      FRONTEND_URL: http://72.61.28.108:8090
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ─── BrightBean (Django app) ────────────────────────────────────────────────
  brightbean:
    build:
      context: ./brightbean
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/brightbean
      LASTSAAS_JWT_SECRET: ${JWT_ACCESS_SECRET}
    depends_on:
      - postgres
    restart: unless-stopped

  # ─── BrightBean (background worker) ────────────────────────────────────────
  brightbean-worker:
    build:
      context: ./brightbean
      dockerfile: Dockerfile
    command: ["/bin/sh", "-c", "sleep 15 && python manage.py process_tasks"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/brightbean
      LASTSAAS_JWT_SECRET: ${JWT_ACCESS_SECRET}
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  mongodb_data:
  postgres_data:
