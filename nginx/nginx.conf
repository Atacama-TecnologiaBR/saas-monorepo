events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    # Resolver do Docker para DNS dinâmico (resolve nomes mesmo quando containers ainda sobem)
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # ── BrightBean Social Media (Django + HTMX) ───────────────────────
        location /social/ {
            set $brightbean brightbean;
            proxy_pass         http://$brightbean:8000/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Script-Name     /social;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        location /social-static/ {
            set $brightbean brightbean;
            proxy_pass http://$brightbean:8000/static/;
            proxy_set_header Host $host;
        }

        location /social-media/ {
            set $brightbean brightbean;
            proxy_pass http://$brightbean:8000/media/;
            proxy_set_header Host $host;
        }

        # ── LastSaaS: API + React SPA (tudo via Go) ───────────────────────
        location / {
            set $lastsaas lastsaas;
            proxy_pass         http://$lastsaas:4290;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }
    }
}
