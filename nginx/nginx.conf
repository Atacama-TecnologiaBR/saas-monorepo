events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    # Docker embedded DNS — re-resolve container IPs dynamically
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # ── BrightBean: static files (/social-static/foo → /static/foo) ─────
        location /social-static/ {
            set $brightbean brightbean;
            rewrite ^/social-static/(.*)$ /static/$1 break;
            proxy_pass http://$brightbean:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── BrightBean: media files (/social-media/foo → /media/foo) ────────
        location /social-media/ {
            set $brightbean brightbean;
            rewrite ^/social-media/(.*)$ /media/$1 break;
            proxy_pass http://$brightbean:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── BrightBean: Django auth endpoints (/accounts/login/, /accounts/logout/, etc.)
        # Django LOGIN_URL defaults to /accounts/login/. Without this block, auth
        # redirects from BrightBean land on LastSaaS (catch-all /), showing React SPA.
        location /accounts/ {
            set $brightbean brightbean;
            proxy_pass         http://$brightbean:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # ── BrightBean: Social Media app (/social/foo → /foo on BrightBean) ─
        # IMPORTANT: proxy_pass with a variable + URI path does NOT strip the
        # location prefix. Use rewrite+break so nginx rewrites the URI first,
        # then proxy_pass (without a path) forwards the rewritten URI as-is.
        location /social/ {
            set $brightbean brightbean;
            rewrite ^/social/(.*)$ /$1 break;
            proxy_pass         http://$brightbean:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Script-Name     /social;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # ── LastSaaS: API + React SPA (catch-all) ────────────────────────────
        location / {
            set $lastsaas lastsaas;
            proxy_pass         http://$lastsaas:4290;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }
    }
}
