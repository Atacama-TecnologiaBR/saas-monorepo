events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    upstream lastsaas_backend {
        server lastsaas:4290;
    }

    upstream brightbean_app {
        server brightbean:8000;
    }

    upstream react_frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # ── LastSaaS API (Go backend) ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://lastsaas_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── BrightBean Social Media (Django + HTMX) ───────────────────────
        # All social routes: app itself + SSO handshake + static/media
        location /social/ {
            proxy_pass         http://brightbean_app/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Script-Name     /social;
        }

        location /social-static/ {
            proxy_pass         http://brightbean_app/static/;
            proxy_set_header   Host $host;
        }

        location /social-media/ {
            proxy_pass         http://brightbean_app/media/;
            proxy_set_header   Host $host;
        }

        # ── React SPA (LastSaaS frontend) ─────────────────────────────────
        location / {
            proxy_pass         http://react_frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
